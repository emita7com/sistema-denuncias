<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Denuncias - Defensoría</title>
    <style>
        body { background-color: #fdf3f2; font-family: Arial, sans-serif; padding: 20px; }
        h1 { color: #b41b3a; }
        table { width: 100%; border-collapse: collapse; background: #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        th, td { padding: 12px; border-bottom: 1px solid #ddd; text-align: left; }
        th { background: #e03e59; color: white; }
        a.btn { text-decoration: none; background: #e03e59; color: white; padding: 8px 15px; border-radius: 8px; }
        a.btn:hover { background: #b41b3a; }
    </style>
</head>
<body>
    <h1>Casos asignados - Defensoría de la Niñez</h1>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Tipo de acoso</th>
                <th>Descripción</th>
                <th>Estado</th>
                <th>Fecha</th>
                <th>Acción</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="denuncia : ${denuncias}">
                <td th:text="${denuncia.idDenuncia}"></td>
                <td th:text="${denuncia.tipoAcoso}"></td>
                <td th:text="${denuncia.descripcion}"></td>
                <td th:text="${denuncia.estado}"></td>
                <td th:text="${#temporals.format(denuncia.fecha, 'dd/MM/yyyy HH:mm')}"></td>
                <td>
                    <a th:href="@{'/seguimiento/' + ${denuncia.idDenuncia}}" class="btn">📋 Ver seguimiento</a>
                </td>
            </tr>
        </tbody>
    </table>
</body>
</html>
