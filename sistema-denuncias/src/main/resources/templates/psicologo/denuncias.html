<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Panel Psicólogo</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: #eef2ff;
        }

        /* SIDEBAR */
        .sidebar {
            width: 260px;
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            background: linear-gradient(180deg, #0038ff, #d00000);
            color: white;
            padding: 30px;
            box-shadow: 3px 0 12px rgba(0,0,0,0.25);
        }

        .sidebar h2 {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 40px;
            text-align: center;
        }

        .menu-item {
            background: rgba(255,255,255,0.25);
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 15px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            font-weight: bold;
        }

        .menu-item:hover {
            background: rgba(255,255,255,0.45);
            transform: translateX(5px);
        }

        /* MAIN */
        .main {
            margin-left: 270px;
            padding: 30px;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 18px;
            box-shadow: 0 7px 15px rgba(0,0,0,0.15);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            border-radius: 12px;
            overflow: hidden;
        }

        thead {
            background: #0038ff;
            color: white;
        }

        th, td {
            padding: 12px;
            font-size: 14px;
        }

        tr:nth-child(even) { background: #f7f7f7; }

        .btn {
            padding: 8px 14px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            color: white;
            font-weight: 500;
        }

        .btn-blue { background: #0077b6; }
        .btn-green { background: #00c853; }
        .btn-red { background: #d00000; }
        .btn-blue:hover { background: #005e8f; }
        .btn-green:hover { background: #00993f; }
        .btn-red:hover { background: #a30000; }

        .img-mini {
            width: 100px;
            height: 70px;
            object-fit: cover;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.2s;
        }

        .img-mini:hover { transform: scale(1.06); }

        .profile-img {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #0038ff;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>

<!-- =============== SIDEBAR =============== -->
<div class="sidebar">
    <h2>Psicólogo</h2>

    <div class="menu-item" onclick="mostrarSeccion('inicio')">Inicio</div>
    <div class="menu-item" onclick="mostrarSeccion('denuncias')">Denuncias</div>
    <div class="menu-item" onclick="mostrarSeccion('reportes')">Reportes</div>

    <form th:action="@{/auth/logout}" method="post">
        <button class="btn-red btn" style="width:100%; margin-top:40px;">Cerrar sesión</button>
    </form>
</div>


<!-- =============== MAIN CONTENT =============== -->
<div class="main">

    <!-- ========== SECCIÓN INICIO (Perfil) ========== -->
    <div id="seccion-inicio" class="card">
        <h2>Mi Perfil</h2>

        <center>
            <img th:src="@{'/uploads/' + ${psicologo.foto_perfil}}" class="profile-img"
                 onerror="this.src='https://cdn-icons-png.flaticon.com/512/149/149071.png'">

            <form th:action="@{/psicologo/subirFoto}" method="post" enctype="multipart/form-data">
                <input type="file" name="foto" required>
                <br><br>
                <button class="btn-blue btn">Actualizar Foto</button>
            </form>
        </center>

        <br>
        <p><strong>Nombre:</strong> <span th:text="${psicologo.nombre}"></span></p>
        <p><strong>Apellido:</strong> <span th:text="${psicologo.apellido}"></span></p>
        <p><strong>Colegio:</strong> <span th:text="${psicologo.colegio.nombre}"></span></p>
    </div>


    <!-- ========== SECCIÓN DENUNCIAS ========== -->
    <div id="seccion-denuncias" class="card" style="display:none;">
        <h2>Listado de Denuncias</h2>

        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Tipo</th>
                    <th>Descripción</th>
                    <th>Fecha</th>
                    <th>Evidencia</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                </tr>
            </thead>

            <tbody>
                <tr th:each="d : ${denuncias}">
                    <td th:text="${d.id_denuncia}"></td>
                    <td th:text="${d.tipo_acoso}"></td>
                    <td th:text="${d.descripcion}"></td>
                    <td th:text="${#temporals.format(d.fecha,'dd/MM/yyyy HH:mm')}"></td>

                    <td>
                        <img th:if="${d.evidencia != null}"
                             th:src="@{'/uploads/' + ${d.evidencia}}"
                             class="img-mini"
                             onclick="abrirImagen(this)">
                    </td>

                    <td th:text="${d.estado}"></td>

                    <td>
                        <button class="btn-blue btn"
                                th:onclick="|abrirModalDerivar(${d.id_denuncia})|">Derivar</button>

                        <form th:action="@{'/psicologo/cerrar/' + ${d.id_denuncia}}"
                              method="post" style="display:inline;">
                            <button class="btn-green btn" type="submit">Cerrar</button>
                        </form>
                    </td>
                </tr>
            </tbody>

        </table>
    </div>


    <!-- ========== SECCIÓN REPORTES ========== -->
    <div id="seccion-reportes" class="card" style="display:none;">
        <h2>Reportes y Estadísticas</h2>

        <input id="buscador" type="text" placeholder="Buscar tipo de acoso..."
               style="width:100%; padding:10px; margin-bottom:20px; border-radius:8px;">

        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Tipo</th>
                    <th>Descripción</th>
                    <th>Fecha</th>
                </tr>
            </thead>

            <tbody id="tablaReportes">
                <tr th:each="r : ${denuncias}">
                    <td th:text="${r.id_denuncia}"></td>
                    <td th:text="${r.tipo_acoso}"></td>
                    <td th:text="${r.descripcion}"></td>
                    <td th:text="${#temporals.format(r.fecha,'dd/MM/yyyy HH:mm')}"></td>
                </tr>
            </tbody>
        </table>

        <br>
        <button class="btn-blue btn" onclick="generarPDF()">Descargar PDF</button>
    </div>

</div>


<!-- =============== SCRIPTS =============== -->
<script>
function mostrarSeccion(sec) {
    document.getElementById("seccion-inicio").style.display = "none";
    document.getElementById("seccion-denuncias").style.display = "none";
    document.getElementById("seccion-reportes").style.display = "none";

    document.getElementById("seccion-" + sec).style.display = "block";
}

/* Mostrar Imagen */
function abrirImagen(img) {
    Swal.fire({
        imageUrl: img.src,
        imageWidth: "90%",
        background: "#000",
        showCloseButton: true
    });
}

/* Modal Derivar */
function abrirModalDerivar(id) {
    Swal.fire({
        title: "Derivar caso",
        input: "textarea",
        inputPlaceholder: "Escribe un mensaje para la directora...",
        showCancelButton: true,
        confirmButtonText: "Enviar",
        cancelButtonText: "Cancelar",
        preConfirm: (mensaje) => {
            if (!mensaje.trim()) {
                Swal.showValidationMessage("Debes escribir un mensaje.");
                return false;
            }
            fetch(`/psicologo/derivar/${id}`, {
                method: "POST",
                headers: { "Content-Type": "application/x-www-form-urlencoded" },
                body: "mensaje=" + encodeURIComponent(mensaje)
            }).then(() => location.reload());
        }
    });
}

/* Buscador */
document.getElementById("buscador").addEventListener("keyup", function () {
    let filtro = this.value.toLowerCase();
    let filas = document.querySelectorAll("#tablaReportes tr");

    filas.forEach(f => {
        let texto = f.textContent.toLowerCase();
        f.style.display = texto.includes(filtro) ? "" : "none";
    });
});

/* PDF */
function generarPDF() {
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF();

    pdf.text("Reporte de Denuncias", 10, 10);
    pdf.text("Generado por el Psicólogo", 10, 20);

    let y = 40;
    document.querySelectorAll("#tablaReportes tr").forEach(tr => {
        const datos = tr.innerText.split("\n").join(" | ");
        pdf.text(datos, 10, y);
        y += 10;
    });

    pdf.save("reporte-denuncias.pdf");
}
</script>

</body>
</html>
